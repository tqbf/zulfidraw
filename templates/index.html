<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ drawing['name'] }} · Zulfidraw</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2 22 8v8l-10 6L2 16V8z' fill='%236366f1'/></svg>">
  <script src="{{ url_for('static', filename='vendor/htmx.min.js') }}" defer></script>
</head>
<body class="h-full overflow-hidden bg-slate-50 text-slate-800 select-none">

  <svg id="canvas" class="absolute inset-0 h-full w-full touch-none bg-white"></svg>

  <!-- top bar -->
  <div class="pointer-events-none absolute inset-x-0 top-0 z-20 flex items-start justify-between gap-3 p-3">

    <!-- menu island -->
    <div class="pointer-events-auto relative">
      <button id="menuBtn" title="Menu"
              class="grid h-10 w-10 place-items-center rounded-lg border border-slate-200 bg-white shadow-sm hover:bg-slate-100">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div id="menuPanel" class="absolute left-0 top-12 hidden w-72 rounded-xl border border-slate-200 bg-white p-3 shadow-lg">
        <label class="mb-1 block text-xs font-medium text-slate-500">Drawing name</label>
        <input name="name" value="{{ drawing['name'] }}" maxlength="80"
               hx-post="/d/{{ drawing['id'] }}/rename" hx-trigger="change" hx-swap="none"
               class="mb-3 w-full rounded-md border border-slate-300 px-2 py-1.5 text-sm focus:border-indigo-400 focus:outline-none"
               onchange="document.title = this.value + ' · Zulfidraw'">
        <div class="mb-3 flex gap-2">
          <button hx-post="/drawings" hx-swap="none"
                  class="flex-1 rounded-md bg-indigo-600 px-2 py-1.5 text-sm font-medium text-white hover:bg-indigo-500">New drawing</button>
          <button id="exportBtn"
                  class="flex-1 rounded-md border border-slate-300 px-2 py-1.5 text-sm hover:bg-slate-100">Export SVG</button>
        </div>
        <div class="mb-1 text-xs font-medium text-slate-500">All drawings</div>
        <div id="drawingList"
             hx-get="/partials/drawings?current={{ drawing['id'] }}"
             hx-trigger="load, drawingsChanged from:body"
             class="mb-3 max-h-48 overflow-y-auto"></div>
        <div class="mb-1 text-xs font-medium text-slate-500">Version history</div>
        <div id="historyList"
             hx-get="/partials/history/{{ drawing['id'] }}"
             hx-trigger="load, menuOpened from:body"
             class="max-h-40 overflow-y-auto"></div>
      </div>
    </div>

    <!-- tool island -->
    <div id="toolbar" class="pointer-events-auto flex items-center gap-1 rounded-xl border border-slate-200 bg-white p-1 shadow-sm">
      <button data-tool="select" title="Select — V" class="tool-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M5 3l14 8-6.5 1.5L9 19z"/></svg>
      </button>
      <button data-tool="pan" title="Pan — H (or hold Space)" class="tool-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V7a1.5 1.5 0 0 0-3 0m0 4V5a1.5 1.5 0 0 0-3 0v6m0-5a1.5 1.5 0 0 0-3 0v8L7.5 12A1.6 1.6 0 0 0 5 14l4 6c.8 1.2 2 2 4 2h2a5 5 0 0 0 5-5v-6a1.5 1.5 0 0 0-2-1.4"/></svg>
      </button>
      <div class="mx-1 h-6 w-px bg-slate-200"></div>
      <button data-tool="line" title="Line — L" class="tool-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 19 20 5"/><circle cx="4" cy="19" r="1.6" fill="currentColor" stroke="none"/><circle cx="20" cy="5" r="1.6" fill="currentColor" stroke="none"/></svg>
      </button>
      <button data-tool="poly" title="Polygon / polyline — P (click points, Enter or click start to finish)" class="tool-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M4 18 9 6l6 6 5-7"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/><circle cx="9" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="20" cy="5" r="1.5" fill="currentColor" stroke="none"/></svg>
      </button>
      <button data-tool="arrow" title="Arrow — A (drag for straight, or click points for an elbow arrow)" class="tool-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19 19 6"/><path d="M12 5h7v7"/></svg>
      </button>
      <button data-tool="box" title="Iso box — B (drag footprint, then set height)" class="tool-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M12 2.5 21 8v8l-9 5.5L3 16V8z"/><path d="M3 8l9 5.5L21 8M12 13.5V21.5"/></svg>
      </button>
      <button data-tool="text" title="Text — T" class="tool-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 6V4h14v2M12 4v16m-3 0h6"/></svg>
      </button>
      <div class="mx-1 h-6 w-px bg-slate-200"></div>
      <button id="undoBtn" title="Undo — Ctrl+Z" class="tool-btn disabled:opacity-30 disabled:hover:bg-transparent">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 0 12h-3"/></svg>
      </button>
      <button id="redoBtn" title="Redo — Ctrl+Shift+Z" class="tool-btn disabled:opacity-30 disabled:hover:bg-transparent">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m15 14 5-5-5-5"/><path d="M20 9H10a6 6 0 0 0 0 12h3"/></svg>
      </button>
    </div>

    <!-- save status -->
    <div class="pointer-events-auto flex h-10 items-center rounded-lg border border-slate-200 bg-white px-3 shadow-sm">
      <span id="saveStatus" class="text-xs text-slate-400">Saved</span>
    </div>
  </div>

  <!-- style panel -->
  <div id="stylePanel" class="absolute left-3 top-20 z-10 w-56 rounded-xl border border-slate-200 bg-white p-3 shadow-lg">
    <div class="mb-1 text-xs font-medium text-slate-500">Stroke</div>
    <div id="strokeSwatches" class="mb-3 flex gap-1.5"></div>
    <div class="mb-1 text-xs font-medium text-slate-500">Fill</div>
    <div id="fillSwatches" class="mb-3 flex gap-1.5"></div>
    <div class="mb-1 text-xs font-medium text-slate-500">Stroke width</div>
    <div id="widthBtns" class="mb-3 flex gap-1.5"></div>
    <div class="mb-1 text-xs font-medium text-slate-500">Stroke style</div>
    <div id="dashBtns" class="mb-3 flex gap-1.5"></div>
    <div class="mb-1 text-xs font-medium text-slate-500">Edges</div>
    <div id="edgeBtns" class="mb-3 flex gap-1.5"></div>
    <div id="headsRow" class="hidden">
      <div class="mb-1 text-xs font-medium text-slate-500">Arrowheads</div>
      <div id="headBtns" class="mb-3 flex gap-1.5"></div>
    </div>
    <div class="mb-1 flex items-baseline justify-between text-xs font-medium text-slate-500">
      <span>Opacity</span><span id="opVal" class="tabular-nums text-slate-400">100%</span>
    </div>
    <input id="opacity" type="range" min="10" max="100" step="10" value="100"
           class="mb-3 h-1.5 w-full cursor-pointer appearance-none rounded-full bg-slate-200 accent-indigo-600">
    <div class="mb-1 text-xs font-medium text-slate-500">Order</div>
    <div id="zBtns" class="flex gap-1.5"></div>
  </div>

  <!-- zoom island -->
  <div class="absolute bottom-3 left-3 z-10 flex items-center rounded-lg border border-slate-200 bg-white shadow-sm">
    <button id="zoomOut" class="grid h-9 w-9 place-items-center rounded-l-lg hover:bg-slate-100 text-lg leading-none">−</button>
    <button id="zoomReset" title="Reset zoom" class="h-9 w-14 text-xs tabular-nums hover:bg-slate-100">100%</button>
    <button id="zoomIn" class="grid h-9 w-9 place-items-center rounded-r-lg hover:bg-slate-100 text-lg leading-none">+</button>
  </div>

  <div id="hint" class="pointer-events-none absolute bottom-3 right-3 z-10 rounded-md bg-white/80 px-2 py-1 text-xs text-slate-400"></div>

  <script>
    window.ZULFIDRAW = {
      id: {{ drawing['id'] | tojson }},
      doc: {{ doc | safe }}
    };
  </script>
  <script src="{{ url_for('static', filename='js/iso.js') }}"></script>
</body>
</html>
